name: 광고비 자동 조정

on:
  schedule:
    # KST = UTC+9, 각 발동 시각을 UTC로 변환
    - cron: '0 23 * * *'   # KST 08:00 (UTC 23:00 전날)
    - cron: '10 23 * * *'  # KST 08:10
    - cron: '20 23 * * *'  # KST 08:20
    - cron: '50 0 * * *'   # KST 09:50
    - cron: '0 1 * * *'    # KST 10:00
    - cron: '10 1 * * *'   # KST 10:10
    - cron: '50 2 * * *'   # KST 11:50
    - cron: '0 3 * * *'    # KST 12:00
    - cron: '10 3 * * *'   # KST 12:10
    - cron: '30 3 * * *'   # KST 12:30
    - cron: '50 5 * * *'   # KST 14:50
    - cron: '0 6 * * *'    # KST 15:00
    - cron: '10 6 * * *'   # KST 15:10
    - cron: '0 9 * * *'    # KST 18:00
    - cron: '5 9 * * *'    # KST 18:05
    - cron: '10 9 * * *'   # KST 18:10
    - cron: '0 12 * * *'   # KST 21:00
  workflow_dispatch:        # 수동 실행 가능

jobs:
  adjust:
    runs-on: ubuntu-latest
    steps:
      - name: 광고비 규칙 실행
        run: |
          curl -s -X POST \
            https://ozkiz-proxy.vercel.app/api/auto-adjust \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -d '{}' \
            | jq .
