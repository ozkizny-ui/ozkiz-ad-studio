name: 광고비 자동 조정

on:
  schedule:
    # catch-up 방식: GitHub cron 지연(30~70분)을 견디도록 운영시간(KST 08~21시)에
    # 15분 간격으로 호출. 실제 발동/중복방지는 auto-adjust.js가 budget_rule_logs로 판단.
    # KST = UTC+9 (KST 08:00 = UTC 23:00 전날, KST 21:00 = UTC 12:00)
    - cron: '*/15 23 * * *'    # UTC 23:00,23:15,23:30,23:45 = KST 08:00~08:45
    - cron: '*/15 0-12 * * *'  # UTC 00:00~12:45 = KST 09:00~21:45
  workflow_dispatch:           # 수동 실행 가능

jobs:
  adjust:
    runs-on: ubuntu-latest
    steps:
      - name: 광고비 규칙 실행
        run: |
          curl -s -X POST \
            https://ozkiz-proxy.vercel.app/api/auto-adjust \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -d '{}' \
            | jq .
